<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo gris plateado con brillo -->
  <defs>
    <radialGradient id="bgGradient" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#F5F7FA;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#D8DCE3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A8B0BD;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="shine" cx="40%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Fondo circular -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGradient)"/>
  
  <!-- Efecto de brillo -->
  <circle cx="256" cy="256" r="256" fill="url(#shine)"/>
  
  <!-- Cabeza del gato -->
  <circle cx="256" cy="200" r="90" fill="#2C2C2C" stroke="#1A1A1A" stroke-width="2"/>
  
  <!-- Oreja izquierda -->
  <polygon points="200,120 170,60 210,110" fill="#2C2C2C" stroke="#1A1A1A" stroke-width="2"/>
  
  <!-- Oreja derecha -->
  <polygon points="312,120 342,60 302,110" fill="#2C2C2C" stroke="#1A1A1A" stroke-width="2"/>
  
  <!-- Interior oreja izquierda -->
  <polygon points="200,115 185,80 200,105" fill="#FF69B4" opacity="0.8"/>
  
  <!-- Interior oreja derecha -->
  <polygon points="312,115 327,80 312,105" fill="#FF69B4" opacity="0.8"/>
  
  <!-- Hocico -->
  <circle cx="256" cy="220" r="35" fill="#FFFFFF" stroke="#2C2C2C" stroke-width="1.5"/>
  
  <!-- Nariz -->
  <polygon points="256,210 250,225 262,225" fill="#FF69B4"/>
  
  <!-- Boca -->
  <path d="M 256 225 Q 245 235 235 230" stroke="#2C2C2C" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 256 225 Q 267 235 277 230" stroke="#2C2C2C" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Ojo izquierdo -->
  <ellipse cx="230" cy="190" rx="12" ry="18" fill="#FFD700" stroke="#2C2C2C" stroke-width="1.5"/>
  <circle cx="230" cy="192" r="6" fill="#000000"/>
  <circle cx="232" cy="188" r="2" fill="#FFFFFF"/>
  
  <!-- Ojo derecho -->
  <ellipse cx="282" cy="190" rx="12" ry="18" fill="#FFD700" stroke="#2C2C2C" stroke-width="1.5"/>
  <circle cx="282" cy="192" r="6" fill="#000000"/>
  <circle cx="284" cy="188" r="2" fill="#FFFFFF"/>
  
  <!-- Bigotes izquierdo -->
  <line x1="210" y1="215" x2="170" y2="210" stroke="#2C2C2C" stroke-width="2" stroke-linecap="round"/>
  <line x1="210" y1="225" x2="170" y2="230" stroke="#2C2C2C" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Bigotes derecho -->
  <line x1="302" y1="215" x2="342" y2="210" stroke="#2C2C2C" stroke-width="2" stroke-linecap="round"/>
  <line x1="302" y1="225" x2="342" y2="230" stroke="#2C2C2C" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Cuerpo -->
  <ellipse cx="256" cy="320" rx="75" ry="85" fill="#2C2C2C" stroke="#1A1A1A" stroke-width="2"/>
  
  <!-- Pata delantera izquierda -->
  <rect x="210" y="385" width="25" height="70" rx="12" fill="#2C2C2C" stroke="#1A1A1A" stroke-width="1.5"/>
  
  <!-- Pata delantera derecha -->
  <rect x="277" y="385" width="25" height="70" rx="12" fill="#2C2C2C" stroke="#1A1A1A" stroke-width="1.5"/>
  
  <!-- Cola (curva elegante) -->
  <path d="M 320 300 Q 370 280 375 220 Q 378 180 360 150" stroke="#2C2C2C" stroke-width="20" fill="none" stroke-linecap="round"/>
  
  <!-- Acento dorado (marca premium) -->
  <circle cx="256" cy="150" r="8" fill="#D4AF37"/>
  
  <!-- Texto "MININA IA" bajo el gato -->
  <text x="256" y="480" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#2C2C2C" letter-spacing="2">
    MININA IA
  </text>
</svg>