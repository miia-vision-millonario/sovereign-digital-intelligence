<svg width="800" height="1200" viewBox="0 0 800 1200" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#05070a;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
            </linearGradient>
            <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#f1d592;stop-opacity:1" />
                <stop offset="50%" style="stop-color:#d4af37;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#8b6d11;stop-opacity:1" />
            </linearGradient>
            <filter id="glow">
                <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
                <feMerge>
                    <feMergeNode in="coloredBlur"/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            </filter>
        </defs>
        
        <!-- Fondo -->
        <rect width="800" height="1200" fill="url(#bgGrad)"/>
        
        <!-- Geometría Generativa (Nodos de Inteligencia) -->
        <g filter="url(#glow)" opacity="0.4">
            <path d="M 256 432 L 432 744 L 608 1056 Z" fill="none" stroke="url(#goldGrad)" stroke-width="2"/>
            <circle cx="256" cy="432" r="8" fill="url(#goldGrad)"/>
            <circle cx="432" cy="744" r="8" fill="url(#goldGrad)"/>
            <circle cx="608" cy="1056" r="8" fill="url(#goldGrad)"/>
        </g>
        
        <!-- Bordes de Lujo -->
        <rect x="40" y="40" width="720" height="1120" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.3"/>
        
        <!-- Texto del Activo -->
        <text x="400" y="550" font-family="Arial, sans-serif" font-size="24" fill="#d4af37" text-anchor="middle" letter-spacing="10" font-weight="900" style="text-transform: uppercase;">MININA EDITORIAL</text>
        <rect x="350" y="570" width="100" height="2" fill="#d4af37"/>
        
        <text x="400" y="700" font-family="Arial, sans-serif" font-size="48" fill="#ffffff" text-anchor="middle" font-weight="900" style="text-transform: uppercase;">AI AUTONOMOUS AGENTS</text>
        
        <text x="400" y="800" font-family="Arial, sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle" letter-spacing="4" font-weight="600">EDICIÓN SOBERANA 2026</text>
        
        <!-- Sello de Certificación -->
        <circle cx="400" cy="1000" r="40" fill="none" stroke="url(#goldGrad)" stroke-width="2"/>
        <text x="400" y="1007" font-family="Arial, sans-serif" font-size="12" fill="#d4af37" text-anchor="middle" font-weight="900">CERTIFIED</text>
    </svg>